<!DOCTYPE html>
<html>

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;

      opacity: 0.7;
    }

      margin-top: 20px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

</head>
<body>
  <div class="card">
    <h1> Blocked by Stop Blocker</h1>
