<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stop Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <!-- Close (X) icon — LEFT -->
    <img
      class="header-icon"
      id="closeBtn"
      src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
        <line x1='5' y1='5' x2='19' y2='19' stroke='%23c0392b' stroke-width='3'/>
        <line x1='19' y1='5' x2='5' y2='19' stroke='%23c0392b' stroke-width='3'/>
      </svg>"
    />

    <!-- Settings icon — RIGHT -->
    <img
      class="header-icon"
      id="settingsBtn"
      src="data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'>
        <path d='M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z'/>
        <path d='M19.4 12.9a7.9 7.9 0 0 0 .1-1
                 7.9 7.9 0 0 0-.1-1l2-1.6
                 -2-3.4-2.4 1a8.4 8.4 0 0 0-1.7-1l-.4-2.6H9.1l-.4 2.6
                 a8.4 8.4 0 0 0-1.7 1l-2.4-1-2 3.4
                 2 1.6a7.9 7.9 0 0 0-.1 1
                 7.9 7.9 0 0 0 .1 1l-2 1.6
                 2 3.4 2.4-1a8.4 8.4 0 0 0 1.7 1l.4 2.6h5.8l.4-2.6
                 a8.4 8.4 0 0 0 1.7-1l2.4 1
                 2-3.4-2-1.6z'/>
      </svg>"
    />
  </div>

  <div class="content">
  <!-- Block websites -->
<div class="view active" id="sites">
    <p>Click below to block porn website</p>
    <button id="blockBtn">Click here and block</button>
</div> <!-- close sites -->
  
    <!-- Block keywords -->
    <div class="view" id="keywords">
      <h3>Add a keyword</h3>
      <div class="row">
        <input placeholder="Enter a keyword">
  <button id="addKeywordBtn">Add</button>
      </div>
      <button class="gray-btn" id="viewKeywordsBtn">View my keyword list</button>
      <div class="remaining">1 items remaining</div>
      <div class="premium" id="premiumLink">Get Premium to add unlimited items</div>
    </div> <!-- close keywords -->

    <!-- Stats -->         
    <div class="view" id="stats">
  
  <div class="streak-title">
    Days Spent From Porn
  </div>

  <div class="streak-container">
    🔥
    <div id="streakCount">0</div>
  </div>

  <div class="best-streak">
    Best 🔥 <span id="bestStreak">0</span>
  </div>

</div><!-- close stats -->

  </div> <!-- close content -->

  <div class="footer">
    <div class="tabs">
      <div class="tab active" data-view="sites">Block websites</div>
      <div class="tab" data-view="keywords">Block keywords</div>
      <div class="tab" data-view="stats">Browsing stats</div>
    </div>
    <div class="toggle" id="toggle"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
